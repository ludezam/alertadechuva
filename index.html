<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>🌧️ Alerta Chuva</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<!-- FUNDO iOS -->
<div class="sun sky-object"></div>
<div class="rain-layer" id="rain"></div>

<header class="topo">
  <h1>🌧️ Alerta Chuva</h1>
  <p class="subtitulo">Radar em tempo real e previsão das próximas horas</p>
</header>

<section class="resumo-clima">
  <div class="cidade-atual">
    📍 <span id="cidadeAtual">Detectando localização...</span>
  </div>

  <div class="temperatura-principal">
    <span id="tempAtual">--°</span>
  </div>

  <div id="statusChuva" class="status status-verde">
    🟢 Pode sair tranquilo
  </div>

  <p id="descricaoAtual" class="descricao"></p>

  <div class="dados-resumo">
    <div class="item-resumo">🌡️<span>Sensação</span><strong id="sensacaoAtual">--°</strong></div>
    <div class="item-resumo">💧<span>Umidade</span><strong id="umidadeAtual">--%</strong></div>
    <div class="item-resumo">🌬️<span>Vento</span><strong id="ventoAtual">-- km/h</strong></div>
  </div>
</section>

<section class="radar">
  <h2>🛰️ Radar de chuva</h2>

  
  </iframe>

  <a class="btn-ipmet"
    href="https://www.ipmetradar.com.br/2mobileGis.php"
    target="_blank">
    🗺️ Abrir radar do IPMet
  </a>
</section>

<section class="controles">
  <input id="cidade" type="text" placeholder="Digite uma cidade">
  <button id="btnBuscar">🔎 Buscar cidade</button>
  <button id="btnGPS">📍 Meu local</button>
  <button id="btnRefresh">🔄 Atualizar previsão</button>
</section>

<section class="previsao-12h">
  <h2>🕒 Previsão hora a hora</h2>
  <div class="previsao-scroll" id="previsao12h"></div>
</section>

<footer>
  <small>
    Desenvolvido por LDZ<br>
    Open-Meteo • RainViewer • IPMet
  </small>
</footer>

</body>
</html>

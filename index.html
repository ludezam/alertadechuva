<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alerta de Chuva – SJRP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #0e1621;
    color: white;
    text-align: center;
    padding: 20px;
}
h1 {
    font-size: 1.8em;
}
.status {
    font-size: 1.6em;
    margin: 20px 0;
}
.box {
    background: #162235;
    padding: 15px;
    border-radius: 12px;
    max-width: 500px;
    margin: auto;
}
small {
    opacity: 0.7;
}
</style>
</head>

<body>

<h1>🌧️ Alerta de Chuva</h1>
<div style="max-width:500px; margin:auto; margin-bottom:15px;">
    <input
        id="cidade"
        placeholder="Digite a cidade (ex: Rio Preto)"
        style="width:100%; padding:10px; border-radius:8px; border:none; font-size:1em;"
    >
    <button onclick="buscarCidade()" style="margin-top:8px; width:100%; padding:10px; border-radius:8px;">
        🔎 Usar cidade
    </button>
    <button onclick="usarGPS()" style="margin-top:8px; width:100%; padding:10px; border-radius:8px;">
        📍 Usar minha localização
    </button>
</div>
<div class="box">
    <div class="status" id="status">Carregando...</div>
    <div id="detalhe"></div>
    <div id="contador" style="margin-top:10px; opacity:0.8;"></div>
</div>
<br>
<iframe
  id="mapa"
  width="100%"
  height="350"
  style="border-radius:12px; border:none; margin-top:15px;"
  src="https://embed.rainviewer.com/?loc=-20.81,-49.38,7&oFa=0&oC=0&oU=0&oCS=1&oF=0&oAP=1&c=2&o=83&lm=1&th=0">
</iframe>
<br>
<small> Atualização automática </small> <br>
<small> Desenvolvido por LDZ </small> 

<script>
let LAT = -20.8113;
let LON = -49.3758;

const INTERVALO = 300; // segundos (5 minutos)
let restante = INTERVALO;

async function buscarCidade() {
    const nome = document.getElementById("cidade").value;
    if (!nome) return alert("Digite o nome da cidade");

    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(nome)}&count=1&language=pt&format=json`;

    try {
        const r = await fetch(url);
        const data = await r.json();

        if (!data.results) {
            alert("Cidade não encontrada");
            return;
        }

        LAT = data.results[0].latitude;
        LON = data.results[0].longitude;

        atualizar();
    } catch {
        alert("Erro ao buscar cidade");
    }
}
function usarGPS() {
    if (!navigator.geolocation) {
        alert("GPS não suportado");
        return;
    }
    navigator.geolocation.getCurrentPosition(
        pos => {
            LAT = pos.coords.latitude;
            LON = pos.coords.longitude;
            atualizar();
        },
        () => alert("Permissão de localização negada")
    );
}

async function atualizar() {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&minutely_15=precipitation_probability,precipitation&timezone=America/Sao_Paulo`;
    
    try {
        const r = await fetch(url);
        const data = await r.json();

        const prob = Math.max(...data.minutely_15.precipitation_probability.slice(0,4));
        const chuva = Math.max(...data.minutely_15.precipitation.slice(0,4));

        let status = "🟢 Sem chuva";
        if (prob >= 60 || chuva > 0.3) {
            status = "🔴 Chuva se aproximando ⛈️";
        } else if (prob >= 30) {
            status = "⚠️ Chuva possível";
        }

        document.getElementById("status").innerText = status;
        document.getElementById("detalhe").innerHTML =
            `Probabilidade máx.: <b>${prob}%</b><br>
             Precipitação: <b>${chuva.toFixed(2)} mm</b>`;

        restante = INTERVALO; // reseta contador após atualizar

    } catch {
        document.getElementById("status").innerText = "⚠️ Erro ao atualizar";
    }
}

function atualizarContador() {
    const min = Math.floor(restante / 60);
    const seg = restante % 60;

    document.getElementById("contador").innerText =
        `🔄 Próxima atualização em ${String(min).padStart(2,"0")}:${String(seg).padStart(2,"0")}`;

    if (restante > 0) restante--;
}

atualizar();
setInterval(atualizar, INTERVALO * 1000);
setInterval(atualizarContador, 1000);
</script>

<script>
function recarregarMapa() {
    const iframe = document.getElementById("mapa");
    if (iframe) {
        const src = iframe.src;
        iframe.src = "";
        setTimeout(() => {
            iframe.src = src;
        }, 500);
    }
}

// força recarga do mapa a cada 1 minuto
setInterval(recarregarMapa, 60000);
</script>

</body>
</html>
